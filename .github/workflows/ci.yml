# CotaObra — CI principal
# Destino no repo: .github/workflows/ci.yml
# Roda em: PRs para main + pushes para main
# Versão: 1.0 — 18/05/2026

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ============================================================
  # Lint (backend + frontend em paralelo)
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ matrix.package }}/pnpm-lock.yaml

      - name: Install ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: pnpm install --frozen-lockfile

      - name: Lint ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: pnpm lint

  # ============================================================
  # Typecheck
  # ============================================================
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ matrix.package }}/pnpm-lock.yaml
      - working-directory: ${{ matrix.package }}
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client (backend only)
        if: matrix.package == 'backend'
        working-directory: backend
        run: pnpm prisma generate
      - working-directory: ${{ matrix.package }}
        run: pnpm typecheck

  # ============================================================
  # Unit tests
  # ============================================================
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ matrix.package }}/pnpm-lock.yaml
      - working-directory: ${{ matrix.package }}
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: matrix.package == 'backend'
        working-directory: backend
        run: pnpm prisma generate
      - name: Run unit tests
        working-directory: ${{ matrix.package }}
        run: pnpm test:unit -- --coverage
        env:
          NODE_ENV: test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package }}/coverage/
          retention-days: 7
      - name: Check coverage threshold
        working-directory: ${{ matrix.package }}
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
            echo "Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 60" | bc -l) )); then
              echo "❌ Cobertura abaixo do mínimo (60%). Atual: $COVERAGE%"
              exit 1
            fi
          fi

  # ============================================================
  # Integration tests (backend com Postgres + Redis)
  # ============================================================
  test-integration:
    name: Integration tests (backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cotaobra
          POSTGRES_PASSWORD: cotaobra
          POSTGRES_DB: cotaobra_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U cotaobra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://cotaobra:cotaobra@localhost:5433/cotaobra_test?schema=public"
        run: |
          pnpm prisma generate
          pnpm prisma migrate deploy

      - name: Run integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://cotaobra:cotaobra@localhost:5433/cotaobra_test?schema=public"
          REDIS_URL: "redis://localhost:6380"
          JWT_SECRET: "test-secret-32-chars-aaaaaaaaaaaa"
          FIELD_ENCRYPTION_KEY: "test-aes256-key-32-bytes-must-haveX"
          OPENAI_API_KEY: "fake-key-for-mocked-tests"
          WHATSAPP_PROVIDER: "evolution"
          EVOLUTION_API_URL: "http://localhost:8080"
          EVOLUTION_API_KEY: "test-key"
          EVOLUTION_INSTANCE_NAME: "test"
        run: pnpm test:integration

  # ============================================================
  # Build (sanity check do build de produção)
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit]
    strategy:
      matrix:
        package: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ matrix.package }}/pnpm-lock.yaml
      - working-directory: ${{ matrix.package }}
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma (backend)
        if: matrix.package == 'backend'
        working-directory: backend
        run: pnpm prisma generate
      - working-directory: ${{ matrix.package }}
        run: pnpm build

  # ============================================================
  # Branding guard — bloqueia merge se ainda houver string do branding antigo
  # (a partir do fim do Sprint 0)
  # Whitelist intencional: docs/ (referências históricas ao fork), CHANGELOG.md,
  # backend/prisma/migrations/ (histórico de migrations preservado), este workflow.
  # ============================================================
  branding-guard:
    name: Branding guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leftover branding
        run: |
          echo "Procurando referências a F""armFlow/f""armflow/cot""aagro fora da whitelist..."
          FOUND=$(grep -r -l -i -E "(F""armFlow|f""armflow|cot""aagro)" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --include="*.json" --include="*.md" --include="*.yml" --include="*.yaml" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist --exclude-dir=build \
            --exclude-dir=docs --exclude-dir=migrations \
            --exclude="CHANGELOG.md" --exclude="README.md" \
            --exclude="package-lock.json" --exclude="pnpm-lock.yaml" --exclude="yarn.lock" \
            . | grep -v "ci.yml" || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Encontradas referências de branding antigo em:"
            echo "$FOUND"
            echo ""
            echo "Marque como LEGACY: em comentário ou remova."
            exit 1
          fi
          echo "✅ Branding limpo"
